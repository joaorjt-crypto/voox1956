<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C4956A;--gold-light:#F2E8DC;--gold-dark:#9A6B3E;

  --muted:#8A8478;--border:#E8E2D9;

html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:var(--dark);color:var(--surface);min-height:100vh;overflow-x:hidden}

/* HERO */
.hero{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;padding:2rem;text-align:center;
  background:radial-gradient(ellipse at 30% 20%, #2A1F14 0%, #0F0E0C 60%);
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C4956A' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-eyebrow{font-size:11px;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;margin-bottom:1.5rem;opacity:0;animation:fadeUp 0.8s 0.2s forwards}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,10vw,7rem);font-weight:300;line-height:0.9;letter-spacing:-0.02em;margin-bottom:1.5rem;opacity:0;animation:fadeUp 0.8s 0.4s forwards}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero-sub{font-size:13px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:3rem;opacity:0;animation:fadeUp 0.8s 0.6s forwards}
.hero-line{width:1px;height:60px;background:linear-gradient(to bottom,var(--gold),transparent);margin:0 auto;opacity:0;animation:fadeUp 0.8s 0.8s forwards}
.hero-logo{width:180px;max-width:60%;opacity:0;animation:fadeUp 0.8s 0.3s forwards;margin-bottom:1.5rem;filter:drop-shadow(0 0 40px rgba(196,149,106,0.2))}

/* NAV CATEGORIAS */
.nav-cats{position:sticky;top:0;z-index:50;background:rgba(15,14,12,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(196,149,106,0.15);padding:0 1rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-cats::-webkit-scrollbar{display:none}
.nav-inner{display:flex;gap:0;max-width:900px;margin:0 auto;min-width:max-content}
.nav-btn{background:none;border:none;color:var(--muted);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;padding:1.1rem 1.2rem;cursor:pointer;transition:color 0.2s;white-space:nowrap;position:relative}
.nav-btn::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:1px;background:var(--gold);transition:width 0.3s}
.nav-btn:hover,.nav-btn.active{color:var(--gold)}
.nav-btn.active::after{width:60%}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:0 1rem 6rem}

/* SECTION */
.cat-section{padding:5rem 0 2rem;scroll-margin-top:60px}
.cat-header{display:flex;align-items:center;gap:1.5rem;margin-bottom:3rem}
.cat-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cat-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;letter-spacing:-0.01em}
.cat-title em{font-style:italic;color:var(--gold)}
.cat-count{font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-top:2px}

/* GRID SERVIÇOS */
.services-grid{display:grid;grid-template-columns:1fr;gap:1px;background:rgba(255,255,255,0.05);border-radius:16px;overflow:hidden}
.service-item{background:var(--dark2);padding:1.1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;transition:background 0.2s}
.service-item:hover{background:#23201C}
.service-name{font-size:13px;font-weight:400;color:rgba(255,255,255,0.85);line-height:1.4;text-transform:capitalize}
.service-price{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:var(--gold);white-space:nowrap;flex-shrink:0}
.service-price.free{color:var(--muted);font-size:0.85rem;font-family:'Jost',sans-serif;letter-spacing:0.05em}

/* BUSCA */
.search-wrap{padding:3rem 0 0;max-width:900px;margin:0 auto;padding-left:1rem;padding-right:1rem}
.search-box{position:relative}
.search-box input{width:100%;background:var(--dark2);border:1px solid rgba(196,149,106,0.2);border-radius:12px;padding:1rem 1rem 1rem 3rem;font-family:'Jost',sans-serif;font-size:14px;color:var(--surface);outline:none;transition:border-color 0.2s}
.search-box input::placeholder{color:var(--muted)}
.search-box input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
#search-results{margin-top:1rem;display:none}

/* WHATSAPP BTN */
.wpp-fab{position:fixed;bottom:2rem;right:2rem;background:#25D366;color:#fff;border:none;border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(37,211,102,0.4);font-size:24px;text-decoration:none;transition:transform 0.2s}
.wpp-fab:hover{transform:scale(1.1)}

/* FOOTER */
footer{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:12px;letter-spacing:0.1em;border-top:1px solid rgba(255,255,255,0.05)}
footer span{color:var(--gold)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .hero h1{font-size:3rem}
  .service-item{padding:1rem}
  .service-name{font-size:12px}
}
</style>

function fmt(v){
  if(v===0) return '<span class="service-price free">Consulte</span>';
  if(v<=0.01) return '<span class="service-price free">Consulte</span>';
  return '<span class="service-price">R$&nbsp;' + v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</span>';
}

function renderGrid(id, items){
  var el = document.getElementById('grid-'+id);
  if(!el) return;
  el.innerHTML = items.sort(function(a,b){return a.n.localeCompare(b.n,'pt-BR')}).map(function(s){
    return '<div class="service-item"><span class="service-name">'+s.n+'</span>'+fmt(s.v)+'</div>';
  }).join('');
}

Object.keys(servicos).forEach(function(k){ renderGrid(k, servicos[k]); });

function scrollTo(id, btn){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
}

function buscar(q){
  var res = document.getElementById('search-results');
  if(!q || q.length < 2){ res.style.display='none'; return; }
  q = q.toLowerCase();
  var todos = [];
  Object.keys(servicos).forEach(function(k){
    servicos[k].forEach(function(s){ todos.push({cat:k,item:s}); });
  });
  var encontrados = todos.filter(function(x){ return x.item.n.toLowerCase().includes(q); });
  if(encontrados.length===0){
    res.innerHTML='<div style="padding:1rem;color:var(--muted);font-size:13px;">Nenhum serviço encontrado.</div>';
  } else {
    res.innerHTML='<div style="background:var(--dark2);border-radius:12px;overflow:hidden;border:1px solid rgba(196,149,106,0.15)">'+
      encontrados.map(function(x){
        return '<div class="service-item"><span class="service-name">'+x.item.n+'</span>'+fmt(x.item.v)+'</div>';
      }).join('')+'</div>';
  }
  res.style.display='block';
}

// Highlight nav on scroll
var sections = ['cabelos','manicuras','estetica-facial','estetica-corp','depilacoes','combos'];
window.addEventListener('scroll',function(){
  var pos = window.scrollY + 120;
  sections.forEach(function(id,i){
    var el = document.getElementById(id);
    if(!el) return;
    if(pos >= el.offsetTop){
      document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
      document.querySelectorAll('.nav-btn')[i].classList.add('active');
    }
  });
});
</script>
