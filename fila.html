<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voox 1956 — Lista de Espera</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C4956A;--gold-light:#F2E8DC;--gold-dark:#9A6B3E;
  --dark:#0F0E0C;--dark2:#1C1A17;--dark3:#23201C;
  --surface:#FFFFFF;--muted:#8A8478;--border:#E8E2D9;
  --green:#4A7C59;--green-bg:rgba(74,124,89,0.15);
  --amber:#9A6B1F;--amber-bg:rgba(154,107,31,0.15);
  --red:#9B3A3A;--red-bg:rgba(155,58,58,0.15);
  --blue:#3A6A9B;--blue-bg:rgba(58,106,155,0.15);
  --radius:14px;--radius-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:var(--dark);color:var(--surface);min-height:100vh}

header{
  background:linear-gradient(135deg,#1C1A17 0%,#0F0E0C 100%);
  padding:1.5rem;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(196,149,106,0.15);position:sticky;top:0;z-index:50;
}
.header-brand h1{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;letter-spacing:-0.01em}
.header-brand h1 em{font-style:italic;color:var(--gold)}
.header-brand p{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px}
.admin-area{display:flex;align-items:center;gap:8px}
.login-btn{background:rgba(196,149,106,0.1);border:1px solid rgba(196,149,106,0.3);color:var(--gold);border-radius:var(--radius-sm);padding:7px 14px;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;letter-spacing:0.05em;transition:background 0.2s}
.login-btn:hover{background:rgba(196,149,106,0.2)}
.logout-btn{background:none;border:1px solid rgba(255,255,255,0.1);color:var(--muted);border-radius:var(--radius-sm);padding:5px 10px;font-size:11px;cursor:pointer;font-family:'Jost',sans-serif}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;backdrop-filter:blur(4px)}
.modal{background:var(--dark2);border-radius:var(--radius);padding:2rem;width:100%;max-width:360px;border:1px solid rgba(196,149,106,0.2)}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;margin-bottom:4px}
.modal p{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.modal-err{background:var(--red-bg);color:#E07070;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;display:none;border:1px solid rgba(155,58,58,0.3)}
.modal-cancel{width:100%;padding:10px;background:none;border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);font-family:'Jost',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;margin-top:8px}

.main{max-width:720px;margin:0 auto;padding:2rem 1rem 6rem}

/* FORM CLIENTE */
.form-card{background:var(--dark2);border-radius:var(--radius);border:1px solid rgba(196,149,106,0.2);padding:1.5rem;margin-bottom:2rem}
.form-card-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;margin-bottom:4px}
.form-card-title em{font-style:italic;color:var(--gold)}
.form-card-sub{font-size:12px;color:var(--muted);margin-bottom:1.5rem;letter-spacing:0.03em}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
input,select,textarea{width:100%;padding:10px 12px;background:var(--dark3);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);font-family:'Jost',sans-serif;font-size:14px;color:var(--surface);outline:none;transition:border-color 0.2s}
input:focus,select:focus,textarea:focus{border-color:rgba(196,149,106,0.5)}
input::placeholder,textarea::placeholder{color:var(--muted)}
select option{background:var(--dark2)}
.btn-submit{width:100%;padding:13px;background:var(--gold);color:var(--dark);border:none;border-radius:var(--radius-sm);font-family:'Jost',sans-serif;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:0.05em;transition:opacity 0.2s;margin-top:4px}
.btn-submit:hover{opacity:0.88}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;display:none}
.alert-ok{background:var(--green-bg);color:#7EC89A;border:1px solid rgba(74,124,89,0.3)}
.alert-err{background:var(--red-bg);color:#E07070;border:1px solid rgba(155,58,58,0.3)}

/* FILA */
.fila-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.fila-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300}
.fila-title em{font-style:italic;color:var(--gold)}
.fila-count{font-size:12px;color:var(--muted);background:var(--dark3);padding:4px 12px;border-radius:99px;border:1px solid rgba(255,255,255,0.06)}
.filter-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{background:var(--dark3);border:1px solid rgba(255,255,255,0.08);color:var(--muted);border-radius:99px;padding:5px 14px;font-size:11px;letter-spacing:0.08em;cursor:pointer;font-family:'Jost',sans-serif;transition:all 0.2s;text-transform:uppercase}
.filter-btn:hover,.filter-btn.active{background:rgba(196,149,106,0.15);border-color:rgba(196,149,106,0.4);color:var(--gold)}

/* CARDS */
.fila-list{display:flex;flex-direction:column;gap:10px}
.fila-item{background:var(--dark2);border-radius:var(--radius);border:1px solid rgba(255,255,255,0.06);padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:12px;animation:fadeIn 0.25s ease;transition:border-color 0.2s}
.fila-item:hover{border-color:rgba(196,149,106,0.2)}
.fila-num{width:32px;height:32px;border-radius:50%;background:rgba(196,149,106,0.1);border:1px solid rgba(196,149,106,0.2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold);flex-shrink:0;margin-top:2px}
.fila-info{flex:1;min-width:0}
.fila-nome{font-weight:500;font-size:14px;margin-bottom:3px}
.fila-servico{font-size:12px;color:var(--muted);margin-bottom:6px}
.fila-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500;letter-spacing:0.03em}
.badge-aguardando{background:var(--amber-bg);color:#D4A04A;border:1px solid rgba(154,107,31,0.3)}
.badge-contatada{background:var(--blue-bg);color:#7AABE0;border:1px solid rgba(58,106,155,0.3)}
.badge-confirmada{background:var(--green-bg);color:#7EC89A;border:1px solid rgba(74,124,89,0.3)}
.badge-horario{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid rgba(255,255,255,0.06)}
.badge-tempo{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid rgba(255,255,255,0.06)}
.fila-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.action-btn{display:flex;align-items:center;gap:5px;background:none;border:1px solid rgba(255,255,255,0.08);color:var(--muted);border-radius:var(--radius-sm);padding:5px 10px;font-size:11px;cursor:pointer;font-family:'Jost',sans-serif;transition:all 0.2s;white-space:nowrap}
.action-btn:hover{border-color:rgba(196,149,106,0.3);color:var(--gold)}
.action-btn.wpp{border-color:rgba(37,211,102,0.3);color:#25D366}
.action-btn.wpp:hover{background:rgba(37,211,102,0.1)}
.action-btn.danger{border-color:rgba(155,58,58,0.3);color:#E07070}
.action-btn.danger:hover{background:var(--red-bg)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px;background:var(--dark2);border-radius:var(--radius);border:1px solid rgba(255,255,255,0.05)}
.empty-icon{font-family:'Cormorant Garamond',serif;font-size:3rem;opacity:0.2;display:block;margin-bottom:8px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}.fila-item{flex-wrap:wrap}.fila-actions{flex-direction:row;width:100%}}
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 160" style="height:38px;display:block">
  <text x="150" y="85" font-family="Georgia,'Times New Roman',serif" font-size="82" font-weight="400" fill="white" text-anchor="middle" letter-spacing="-2">Voox</text>
  <text x="150" y="148" font-family="Georgia,'Times New Roman',serif" font-size="58" font-weight="400" fill="white" text-anchor="middle" letter-spacing="2">1956</text>
</svg>
    <p style="font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px">Lista de Espera</p>
  </div>
  <div class="admin-area" id="header-auth">
    <button class="login-btn" onclick="abrirModal()">Admin</button>
  </div>
</header>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h2>Área Admin</h2>
    <p>Acesso restrito à gerência.</p>
    <div class="modal-err" id="modal-err">Usuário ou senha incorretos.</div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Usuário</label>
      <input type="text" id="login-user" onkeydown="if(event.key==='Enter')fazerLogin()"/>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>Senha</label>
      <input type="password" id="login-pass" onkeydown="if(event.key==='Enter')fazerLogin()"/>
    </div>
    <button class="btn-submit" onclick="fazerLogin()">Entrar</button>
    <button class="modal-cancel" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<div class="main">

  <div class="form-card">
    <div class="form-card-title">Entre na <em>lista de espera</em></div>
    <div class="form-card-sub">Preencha seus dados e entraremos em contato assim que houver disponibilidade.</div>
    <div id="alert-form" class="alert"></div>
    <div class="form-grid">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="f-nome" placeholder="Seu nome"/>
      </div>
      <div class="form-group">
        <label>WhatsApp</label>
        <input type="tel" id="f-tel" placeholder="(51) 99999-9999"/>
      </div>
      <div class="form-group">
        <label>Serviço desejado</label>
        <input type="text" id="f-servico" placeholder="Ex: Escova, Manicure..."/>
      </div>
      <div class="form-group">
        <label>Horário preferido</label>
        <select id="f-horario">
          <option value="">Sem preferência</option>
          <option value="Manhã">Manhã</option>
          <option value="Tarde">Tarde</option>
          <option value="Noite">Noite</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Observação (opcional)</label>
        <input type="text" id="f-obs" placeholder="Ex: Prefiro com a Ana, urgente..."/>
      </div>
    </div>
    <button class="btn-submit" onclick="entrarFila()">Entrar na fila de espera</button>
  </div>

  <div class="fila-header">
    <div class="fila-title">Fila de <em>espera</em></div>
    <div class="fila-count" id="fila-count">0 na fila</div>
  </div>

  <div class="filter-row" id="filter-row" style="display:none">
    <button class="filter-btn active" onclick="filtrar('todos',this)">Todas</button>
    <button class="filter-btn" onclick="filtrar('aguardando',this)">Aguardando</button>
    <button class="filter-btn" onclick="filtrar('contatada',this)">Contatada</button>
    <button class="filter-btn" onclick="filtrar('confirmada',this)">Confirmada</button>
  </div>

  <div class="fila-list" id="fila-list">
    <div class="empty"><span class="empty-icon">✦</span>A lista de espera está vazia.</div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCXq8_1adhUWx7Au1IDszbpu5bZ5d0A8gk",
    authDomain: "voox-1956.firebaseapp.com",
    projectId: "voox-1956",
    storageBucket: "voox-1956.firebasestorage.app",
    messagingSenderId: "199589852171",
    appId: "1:199589852171:web:c9196e78067bb7864fc30e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ADMIN_USER = 'joao';
  const ADMIN_PASS = '1012';
  const WPP = '5551992740380';
  let logado = sessionStorage.getItem('admin_logado') === 'sim';
  let fila = [];
  let filtroAtual = 'todos';

  onSnapshot(query(collection(db, 'fila_espera'), orderBy('criadoEm', 'asc')), snap => {
    fila = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderFila();
  });

  function tempoAtras(ts) {
    var diff = Math.floor((Date.now() - ts) / 60000);
    if (diff < 1) return 'agora mesmo';
    if (diff < 60) return diff + 'min atrás';
    var h = Math.floor(diff / 60);
    if (h < 24) return h + 'h atrás';
    return Math.floor(h / 24) + 'd atrás';
  }

  window.abrirModal = function() {
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('login-user').focus();
    document.getElementById('modal-err').style.display = 'none';
  }
  window.fecharModal = function() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
  }
  window.fazerLogin = function() {
    var u = document.getElementById('login-user').value.trim();
    var p = document.getElementById('login-pass').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      logado = true;
      sessionStorage.setItem('admin_logado', 'sim');
      fecharModal();
      atualizarHeader();
      renderFila();
    } else {
      document.getElementById('modal-err').style.display = 'block';
      document.getElementById('login-pass').value = '';
    }
  }
  window.fazerLogout = function() {
    logado = false;
    sessionStorage.removeItem('admin_logado');
    atualizarHeader();
    renderFila();
  }

  function atualizarHeader() {
    var el = document.getElementById('header-auth');
    if (logado) {
      el.innerHTML = '<span style="font-size:12px;color:var(--muted);margin-right:6px;">Admin</span><button class="logout-btn" onclick="fazerLogout()">Sair</button>';
    } else {
      el.innerHTML = '<button class="login-btn" onclick="abrirModal()">Admin</button>';
    }
  }

  function showAlert(id, msg, tipo) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'alert alert-' + tipo;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  window.entrarFila = async function() {
    var nome = document.getElementById('f-nome').value.trim();
    var tel = document.getElementById('f-tel').value.trim();
    var servico = document.getElementById('f-servico').value.trim();
    var horario = document.getElementById('f-horario').value;
    var obs = document.getElementById('f-obs').value.trim();

    if (!nome || !tel || !servico) { showAlert('alert-form', 'Preencha nome, WhatsApp e serviço desejado.', 'err'); return; }

    await addDoc(collection(db, 'fila_espera'), {
      nome, tel, servico, horario, obs, status: 'aguardando', criadoEm: Date.now()
    });

    document.getElementById('f-nome').value = '';
    document.getElementById('f-tel').value = '';
    document.getElementById('f-servico').value = '';
    document.getElementById('f-horario').value = '';
    document.getElementById('f-obs').value = '';
    showAlert('alert-form', 'Você entrou na lista de espera! Entraremos em contato em breve.', 'ok');
  }

  window.mudarStatus = async function(id, status) {
    if (!logado) return;
    await updateDoc(doc(db, 'fila_espera', id), { status });
  }

  window.removerFila = async function(id, nome) {
    if (!logado) return;
    if (!confirm('Remover ' + nome + ' da lista?')) return;
    await deleteDoc(doc(db, 'fila_espera', id));
  }

  window.filtrar = function(f, btn) {
    filtroAtual = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFila();
  }

  function renderFila() {
    var lista = document.getElementById('fila-list');
    var countEl = document.getElementById('fila-count');
    var filterRow = document.getElementById('filter-row');

    var visiveis = filtroAtual === 'todos' ? fila : fila.filter(f => f.status === filtroAtual);
    var aguardando = fila.filter(f => f.status === 'aguardando').length;

    countEl.textContent = aguardando + (aguardando === 1 ? ' aguardando' : ' aguardando');
    filterRow.style.display = logado && fila.length > 0 ? 'flex' : 'none';

    if (visiveis.length === 0) {
      lista.innerHTML = '<div class="empty"><span class="empty-icon">✦</span>' + (filtroAtual === 'todos' ? 'A lista de espera está vazia.' : 'Nenhuma cliente neste status.') + '</div>';
      return;
    }

    var badges = { aguardando: 'badge-aguardando', contatada: 'badge-contatada', confirmada: 'badge-confirmada' };
    var labels = { aguardando: 'Aguardando', contatada: 'Contatada', confirmada: 'Confirmada' };

    lista.innerHTML = visiveis.map((f, i) => {
      var statusBadge = '<span class="badge ' + (badges[f.status] || 'badge-aguardando') + '">' + (labels[f.status] || 'Aguardando') + '</span>';
      var horarioBadge = f.horario ? '<span class="badge badge-horario">' + f.horario + '</span>' : '';
      var tempoBadge = '<span class="badge badge-tempo">' + tempoAtras(f.criadoEm) + '</span>';
      var telLimpo = f.tel.replace(/\D/g, '');
      if (telLimpo.length <= 11) telLimpo = '55' + telLimpo;
      var msgWpp = encodeURIComponent('Olá ' + f.nome + '! Somos do Voox 1956 😊 Temos disponibilidade para o seu ' + f.servico + '. Podemos agendar?');
      var adminActions = logado ? (
        '<a class="action-btn wpp" href="https://wa.me/' + telLimpo + '?text=' + msgWpp + '" target="_blank">📱 WhatsApp</a>' +
        (f.status === 'aguardando' ? '<button class="action-btn" onclick="mudarStatus(\'' + f.id + '\',\'contatada\')">📞 Contatada</button>' : '') +
        (f.status === 'contatada' ? '<button class="action-btn" onclick="mudarStatus(\'' + f.id + '\',\'confirmada\')">✅ Confirmada</button>' : '') +
        '<button class="action-btn danger" onclick="removerFila(\'' + f.id + '\',\'' + f.nome.replace(/'/g,"\\'") + '\')">Remover</button>'
      ) : '';

      return '<div class="fila-item">' +
        '<div class="fila-num">' + (i + 1) + '</div>' +
        '<div class="fila-info">' +
          '<div class="fila-nome">' + f.nome + '</div>' +
          '<div class="fila-servico">' + f.servico + (f.obs ? ' — <em style="color:var(--muted)">' + f.obs + '</em>' : '') + '</div>' +
          '<div class="fila-meta">' + statusBadge + horarioBadge + tempoBadge + '</div>' +
        '</div>' +
        '<div class="fila-actions">' + adminActions + '</div>' +
        '</div>';
    }).join('');
  }

  atualizarHeader();
</script>
</body>
</html>
