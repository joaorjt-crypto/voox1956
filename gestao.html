<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestão — Voox 1956</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F4EF; --surface: #FFFFFF; --accent: #C4956A; --accent-light: #F2E8DC;
    --text: #1C1A17; --muted: #8A8478; --border: #E2DDD6;
    --green: #4A7C59; --green-bg: #EAF2EC; --amber: #9A6B1F; --amber-bg: #FBF1DC;
    --red: #9B3A3A; --red-bg: #FAE8E8; --radius: 14px; --radius-sm: 8px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
  header { background: var(--text); color: #F7F4EF; padding: 1.5rem; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: space-between; }
  header::after { content: ''; position: absolute; right: -40px; top: -40px; width: 180px; height: 180px; border-radius: 50%; background: var(--accent); opacity: 0.15; pointer-events: none; }
  .header-left { position: relative; z-index: 2; }
  .header-right { position: relative; z-index: 2; }
  .login-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #F7F4EF; border-radius: var(--radius-sm); padding: 7px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
  .login-btn:hover { background: rgba(255,255,255,0.2); }
  .login-badge { display: flex; align-items: center; gap: 8px; }
  .login-badge span { font-size: 12px; opacity: 0.7; }
  .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: #F7F4EF; border-radius: var(--radius-sm); padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .main { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* Gate (login / sem acesso) */
  .gate { max-width: 460px; margin: 3rem auto; padding: 2rem 1.5rem; text-align: center; }
  .gate h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); margin-bottom: 8px; }
  .gate p { color: var(--muted); font-size: 14px; margin-bottom: 1.25rem; }
  .google-btn { display: flex; align-items: center; gap: 10px; background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); cursor: pointer; width: 100%; justify-content: center; transition: background 0.2s; }
  .google-btn:hover { background: var(--bg); }
  .google-icon { width: 18px; height: 18px; }

  /* Tabs */
  .tabs { display: flex; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px; margin-bottom: 1.25rem; overflow-x: auto; }
  .tab-btn { flex: 1; min-width: max-content; background: none; border: none; padding: 9px 12px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .tab-btn.active { background: var(--accent); color: white; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--surface); border-radius: var(--radius); padding: 1rem; border: 1px solid var(--border); text-align: center; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 2rem; line-height: 1; color: var(--accent); margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; color: var(--muted); }
  input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; }
  textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .btn { width: 100%; padding: 12px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 10px; display: none; }
  .alert-ok { background: var(--green-bg); color: var(--green); }
  .alert-err { background: var(--red-bg); color: var(--red); }

  .filter-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 6px 14px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .chip.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  .list { display: flex; flex-direction: column; gap: 10px; }
  .item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .item-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .item-title { font-weight: 500; font-size: 15px; word-break: break-word; flex: 1; }
  .item-title.done { text-decoration: line-through; color: var(--muted); }
  .item-desc { font-size: 13px; color: var(--muted); margin-top: 4px; word-break: break-word; white-space: pre-wrap; }
  .item-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 10px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .badge-ok { background: var(--green-bg); color: var(--green); }
  .badge-warn { background: var(--amber-bg); color: var(--amber); }
  .badge-accent { background: var(--accent-light); color: var(--accent); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-muted { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .act-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .act-btn:hover { border-color: var(--accent); color: var(--accent); }
  .act-btn.green:hover { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .del-btn { background: none; border: none; color: var(--border); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 6px; transition: color 0.2s; flex-shrink: 0; }
  .del-btn:hover { color: var(--red); }

  .progress { height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; margin-top: 10px; border: 1px solid var(--border); }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s; }
  .progress-fill.full { background: var(--green); }
  .meta-row { display: flex; justify-content: space-between; align-items: baseline; }
  .meta-val { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--accent); }
  .meta-val small { font-size: 0.8rem; color: var(--muted); font-family: 'DM Sans', sans-serif; }

  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } .stat-num { font-size: 1.5rem; } }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 190" style="height:46px;display:block;margin-bottom:4px">
      <text x="150" y="34" font-family="'Great Vibes',cursive" font-size="32" font-weight="400" fill="white" text-anchor="middle">Estética</text>
      <text x="150" y="112" font-family="Georgia,'Times New Roman',serif" font-size="82" font-weight="400" fill="white" text-anchor="middle" letter-spacing="-2">Voox</text>
      <text x="150" y="177" font-family="Georgia,'Times New Roman',serif" font-size="58" font-weight="400" fill="white" text-anchor="middle" letter-spacing="2">1956</text>
    </svg>
    <p style="font-size:11px;opacity:0.45;font-weight:300;letter-spacing:0.08em;text-transform:uppercase">Gestão da estética</p>
  </div>
  <div class="header-right" id="header-auth"></div>
</header>

<!-- Tela de login / sem acesso -->
<div class="gate" id="gate">
  <h2 id="gate-title">Painel de gestão</h2>
  <p id="gate-msg">Acesso restrito à direção e gerência. Entre com sua conta autorizada.</p>
  <button class="google-btn" onclick="fazerLogin()">
    <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Entrar com Google
  </button>
</div>

<!-- App -->
<div class="main" id="app" style="display:none;">
  <div class="tabs">
    <button class="tab-btn active" data-tab="tarefas" onclick="mostrarTab('tarefas')">Tarefas</button>
    <button class="tab-btn" data-tab="reunioes" onclick="mostrarTab('reunioes')">Reuniões</button>
    <button class="tab-btn" data-tab="metas" onclick="mostrarTab('metas')">Metas & KPIs</button>
    <button class="tab-btn" data-tab="decisoes" onclick="mostrarTab('decisoes')">Decisões</button>
  </div>

  <!-- ===== TAREFAS ===== -->
  <section id="tab-tarefas">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="st-aberto">0</div><div class="stat-label">Em aberto</div></div>
      <div class="stat"><div class="stat-num" id="st-atraso">0</div><div class="stat-label">Atrasadas</div></div>
      <div class="stat"><div class="stat-num" id="st-feito">0</div><div class="stat-label">Concluídas</div></div>
    </div>
    <div class="card">
      <div class="card-title">Nova tarefa</div>
      <div id="alert-tar" class="alert"></div>
      <div class="form-group full">
        <label>Título</label>
        <input type="text" id="t-titulo" placeholder="Ex: Renegociar comissão da equipe de unha" />
      </div>
      <div class="form-group full">
        <label>Detalhes (opcional)</label>
        <textarea id="t-desc" placeholder="Contexto, passos, links..."></textarea>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Responsável</label>
          <select id="t-resp"><option>João</option><option>Gerente</option><option>Equipe</option></select>
        </div>
        <div class="form-group">
          <label>Prioridade</label>
          <select id="t-prio"><option value="alta">Alta</option><option value="media" selected>Média</option><option value="baixa">Baixa</option></select>
        </div>
        <div class="form-group">
          <label>Prazo</label>
          <input type="date" id="t-prazo" />
        </div>
      </div>
      <button class="btn" onclick="criarTarefa()">Adicionar tarefa</button>
    </div>
    <div class="filter-row" id="filtro-tar">
      <button class="chip active" data-f="abertas" onclick="setFiltro('abertas')">Em aberto</button>
      <button class="chip" data-f="todas" onclick="setFiltro('todas')">Todas</button>
      <button class="chip" data-f="concluidas" onclick="setFiltro('concluidas')">Concluídas</button>
    </div>
    <div class="list" id="lista-tar"></div>
  </section>

  <!-- ===== REUNIÕES ===== -->
  <section id="tab-reunioes" style="display:none;">
    <div class="card">
      <div class="card-title">Novo resumo de reunião</div>
      <div id="alert-reu" class="alert"></div>
      <div class="form-grid">
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="r-data" />
        </div>
        <div class="form-group">
          <label>Participantes</label>
          <input type="text" id="r-part" placeholder="João, Gerente..." />
        </div>
      </div>
      <div class="form-group full">
        <label>Título / pauta</label>
        <input type="text" id="r-titulo" placeholder="Ex: Alinhamento de metas de julho" />
      </div>
      <div class="form-group full">
        <label>Resumo</label>
        <textarea id="r-resumo" placeholder="O que foi conversado..."></textarea>
      </div>
      <div class="form-group full">
        <label>Decisões / próximos passos (opcional)</label>
        <textarea id="r-decisoes" placeholder="O que ficou definido..."></textarea>
      </div>
      <button class="btn" onclick="criarReuniao()">Salvar resumo</button>
    </div>
    <div class="list" id="lista-reu"></div>
  </section>

  <!-- ===== METAS & KPIS ===== -->
  <section id="tab-metas" style="display:none;">
    <div class="card">
      <div class="card-title">Nova meta / KPI</div>
      <div id="alert-met" class="alert"></div>
      <div class="form-group full">
        <label>Nome da meta</label>
        <input type="text" id="m-nome" placeholder="Ex: Faturamento do mês" />
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Valor atual</label>
          <input type="number" id="m-atual" placeholder="0" step="any" />
        </div>
        <div class="form-group">
          <label>Meta (alvo)</label>
          <input type="number" id="m-alvo" placeholder="0" step="any" />
        </div>
        <div class="form-group">
          <label>Unidade</label>
          <input type="text" id="m-unid" placeholder="R$, %, agend..." />
        </div>
        <div class="form-group">
          <label>Período</label>
          <input type="text" id="m-periodo" placeholder="Julho/2026" />
        </div>
      </div>
      <button class="btn" onclick="criarMeta()">Adicionar meta</button>
    </div>
    <div class="list" id="lista-met"></div>
  </section>

  <!-- ===== DECISÕES ===== -->
  <section id="tab-decisoes" style="display:none;">
    <div class="card">
      <div class="card-title">Registrar decisão</div>
      <div id="alert-dec" class="alert"></div>
      <div class="form-grid">
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="d-data" />
        </div>
        <div class="form-group">
          <label>Responsável</label>
          <select id="d-resp"><option>João</option><option>Gerente</option><option>Em conjunto</option></select>
        </div>
      </div>
      <div class="form-group full">
        <label>Decisão</label>
        <input type="text" id="d-decisao" placeholder="Ex: Adotar pacote de escova progressiva no catálogo" />
      </div>
      <div class="form-group full">
        <label>Contexto / motivo (opcional)</label>
        <textarea id="d-contexto" placeholder="Por que foi decidido assim..."></textarea>
      </div>
      <button class="btn" onclick="criarDecisao()">Registrar</button>
    </div>
    <div class="list" id="lista-dec"></div>
  </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyCXq8_1adhUWx7Au1IDszbpu5bZ5d0A8gk",
  authDomain: "voox-1956.firebaseapp.com",
  projectId: "voox-1956",
  storageBucket: "voox-1956.firebasestorage.app",
  messagingSenderId: "199589852171",
  appId: "1:199589852171:web:c9196e78067bb7864fc30e"
};

var ADMIN_EMAIL = 'joaorjt@gmail.com';
var GERENTE_EMAIL = 'admvoox1@gmail.com';

var db, auth;
var nivel = 'publico', logado = false;
var tarefas = [], reunioes = [], metas = [], decisoes = [];
var filtroTar = 'abertas';

/* ---------- utilitários ---------- */
function showAlert(id, msg, tipo) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert alert-' + tipo;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 3500);
}
function fmtData(s) {
  if (!s) return '';
  return new Date(s + 'T12:00:00').toLocaleDateString('pt-BR');
}
function hojeStr() {
  var d = new Date(); d.setHours(12,0,0,0);
  return d.toISOString().slice(0,10);
}
function atrasada(t) {
  return t.prazo && t.status !== 'concluida' && t.prazo < hojeStr();
}
function esc(s) { return (s || '').replace(/'/g, "\\'"); }

/* ---------- auth / UI ---------- */
function fazerLogin() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e) { alert('Erro ao fazer login: ' + e.message); });
}
function fazerLogout() { auth.signOut(); }

function atualizarUI() {
  var headerAuth = document.getElementById('header-auth');
  var gate = document.getElementById('gate');
  var app = document.getElementById('app');
  if (logado) {
    var nomeNivel = nivel === 'admin' ? 'Direção' : 'Gerência';
    headerAuth.innerHTML = '<div class="login-badge"><span>' + nomeNivel + '</span><button class="logout-btn" onclick="fazerLogout()">Sair</button></div>';
    gate.style.display = 'none';
    app.style.display = 'block';
  } else {
    headerAuth.innerHTML = '';
    gate.style.display = 'block';
    app.style.display = 'none';
  }
}

function mostrarTab(nome) {
  ['tarefas','reunioes','metas','decisoes'].forEach(function(t) {
    document.getElementById('tab-' + t).style.display = (t === nome) ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === nome);
  });
}

/* ===================== TAREFAS ===================== */
function criarTarefa() {
  if (!logado) return;
  var titulo = document.getElementById('t-titulo').value.trim();
  if (!titulo) { showAlert('alert-tar', 'Dá um título pra tarefa.', 'err'); return; }
  db.collection('gestao_tarefas').add({
    titulo: titulo,
    descricao: document.getElementById('t-desc').value.trim(),
    responsavel: document.getElementById('t-resp').value,
    prioridade: document.getElementById('t-prio').value,
    prazo: document.getElementById('t-prazo').value || '',
    status: 'aberta',
    criadoEm: Date.now()
  }).then(function() {
    document.getElementById('t-titulo').value = '';
    document.getElementById('t-desc').value = '';
    document.getElementById('t-prazo').value = '';
    showAlert('alert-tar', 'Tarefa adicionada!', 'ok');
  }).catch(function(e) { showAlert('alert-tar', 'Erro: ' + e.message, 'err'); });
}
function mudarStatusTarefa(id, status) {
  if (!logado) return;
  db.collection('gestao_tarefas').doc(id).update({ status: status })
    .catch(function(e) { showAlert('alert-tar', 'Erro: ' + e.message, 'err'); });
}
function removerTarefa(id) {
  if (!logado) return;
  if (!confirm('Remover esta tarefa?')) return;
  db.collection('gestao_tarefas').doc(id).delete()
    .catch(function(e) { showAlert('alert-tar', 'Erro: ' + e.message, 'err'); });
}
function setFiltro(f) {
  filtroTar = f;
  document.querySelectorAll('#filtro-tar .chip').forEach(function(c) {
    c.classList.toggle('active', c.dataset.f === f);
  });
  renderTarefas();
}
function renderTarefas() {
  var emAberto = tarefas.filter(function(t) { return t.status !== 'concluida'; }).length;
  var atrasadas = tarefas.filter(atrasada).length;
  var feitas = tarefas.filter(function(t) { return t.status === 'concluida'; }).length;
  document.getElementById('st-aberto').textContent = emAberto;
  document.getElementById('st-atraso').textContent = atrasadas;
  document.getElementById('st-feito').textContent = feitas;

  var lista = tarefas.slice();
  if (filtroTar === 'abertas') lista = lista.filter(function(t) { return t.status !== 'concluida'; });
  else if (filtroTar === 'concluidas') lista = lista.filter(function(t) { return t.status === 'concluida'; });

  // ordem: atrasadas > em andamento > abertas > concluídas; depois por prazo
  var ordemStatus = { andamento: 0, aberta: 1, concluida: 2 };
  lista.sort(function(a, b) {
    if (atrasada(a) !== atrasada(b)) return atrasada(a) ? -1 : 1;
    if (ordemStatus[a.status] !== ordemStatus[b.status]) return ordemStatus[a.status] - ordemStatus[b.status];
    if (a.prazo && b.prazo) return a.prazo.localeCompare(b.prazo);
    if (a.prazo) return -1;
    if (b.prazo) return 1;
    return b.criadoEm - a.criadoEm;
  });

  var el = document.getElementById('lista-tar');
  if (lista.length === 0) { el.innerHTML = '<div class="empty">Nenhuma tarefa aqui.</div>'; return; }

  var prioBadge = { alta: '<span class="badge badge-red">Alta</span>', media: '<span class="badge badge-warn">Média</span>', baixa: '<span class="badge badge-muted">Baixa</span>' };
  var statusBadge = { aberta: '<span class="badge badge-accent">Aberta</span>', andamento: '<span class="badge badge-warn">Em andamento</span>', concluida: '<span class="badge badge-ok">Concluída</span>' };

  el.innerHTML = lista.map(function(t) {
    var done = t.status === 'concluida';
    var prazoBadge = '';
    if (t.prazo) {
      prazoBadge = atrasada(t)
        ? '<span class="badge badge-red">Atrasada · ' + fmtData(t.prazo) + '</span>'
        : '<span class="badge badge-muted">' + fmtData(t.prazo) + '</span>';
    }
    var acoes = '';
    if (t.status === 'aberta') acoes = '<button class="act-btn" onclick="mudarStatusTarefa(\'' + t.id + '\',\'andamento\')">Iniciar</button><button class="act-btn green" onclick="mudarStatusTarefa(\'' + t.id + '\',\'concluida\')">Concluir</button>';
    else if (t.status === 'andamento') acoes = '<button class="act-btn green" onclick="mudarStatusTarefa(\'' + t.id + '\',\'concluida\')">Concluir</button><button class="act-btn" onclick="mudarStatusTarefa(\'' + t.id + '\',\'aberta\')">Pausar</button>';
    else acoes = '<button class="act-btn" onclick="mudarStatusTarefa(\'' + t.id + '\',\'aberta\')">Reabrir</button>';

    return '<div class="item">' +
      '<div class="item-head">' +
        '<div class="item-title' + (done ? ' done' : '') + '">' + t.titulo + '</div>' +
        '<button class="del-btn" onclick="removerTarefa(\'' + t.id + '\')">&times;</button>' +
      '</div>' +
      (t.descricao ? '<div class="item-desc">' + t.descricao + '</div>' : '') +
      '<div class="item-meta">' + statusBadge[t.status] + prioBadge[t.prioridade] + prazoBadge +
        '<span class="badge badge-muted">' + (t.responsavel || '—') + '</span></div>' +
      '<div class="actions">' + acoes + '</div>' +
    '</div>';
  }).join('');
}

/* ===================== REUNIÕES ===================== */
function criarReuniao() {
  if (!logado) return;
  var titulo = document.getElementById('r-titulo').value.trim();
  var resumo = document.getElementById('r-resumo').value.trim();
  if (!titulo && !resumo) { showAlert('alert-reu', 'Preenche pelo menos título ou resumo.', 'err'); return; }
  db.collection('gestao_reunioes').add({
    data: document.getElementById('r-data').value || hojeStr(),
    titulo: titulo,
    participantes: document.getElementById('r-part').value.trim(),
    resumo: resumo,
    decisoes: document.getElementById('r-decisoes').value.trim(),
    criadoEm: Date.now()
  }).then(function() {
    ['r-titulo','r-part','r-resumo','r-decisoes'].forEach(function(i) { document.getElementById(i).value = ''; });
    showAlert('alert-reu', 'Resumo salvo!', 'ok');
  }).catch(function(e) { showAlert('alert-reu', 'Erro: ' + e.message, 'err'); });
}
function removerReuniao(id) {
  if (!logado) return;
  if (!confirm('Remover este resumo?')) return;
  db.collection('gestao_reunioes').doc(id).delete()
    .catch(function(e) { showAlert('alert-reu', 'Erro: ' + e.message, 'err'); });
}
function renderReunioes() {
  var lista = reunioes.slice().sort(function(a, b) {
    return (b.data || '').localeCompare(a.data || '') || (b.criadoEm - a.criadoEm);
  });
  var el = document.getElementById('lista-reu');
  if (lista.length === 0) { el.innerHTML = '<div class="empty">Nenhuma reunião registrada ainda.</div>'; return; }
  el.innerHTML = lista.map(function(r) {
    return '<div class="item">' +
      '<div class="item-head">' +
        '<div class="item-title">' + (r.titulo || 'Reunião') + '</div>' +
        '<button class="del-btn" onclick="removerReuniao(\'' + r.id + '\')">&times;</button>' +
      '</div>' +
      '<div class="item-meta"><span class="badge badge-accent">' + fmtData(r.data) + '</span>' +
        (r.participantes ? '<span class="badge badge-muted">' + r.participantes + '</span>' : '') + '</div>' +
      (r.resumo ? '<div class="item-desc" style="margin-top:10px;">' + r.resumo + '</div>' : '') +
      (r.decisoes ? '<div class="item-desc" style="margin-top:10px;"><strong style="color:var(--accent);">Decisões:</strong>\n' + r.decisoes + '</div>' : '') +
    '</div>';
  }).join('');
}

/* ===================== METAS & KPIS ===================== */
function criarMeta() {
  if (!logado) return;
  var nome = document.getElementById('m-nome').value.trim();
  var alvo = parseFloat(document.getElementById('m-alvo').value);
  if (!nome) { showAlert('alert-met', 'Dá um nome pra meta.', 'err'); return; }
  if (isNaN(alvo) || alvo <= 0) { showAlert('alert-met', 'Informe um valor de meta válido.', 'err'); return; }
  db.collection('gestao_metas').add({
    nome: nome,
    alvo: alvo,
    atual: parseFloat(document.getElementById('m-atual').value) || 0,
    unidade: document.getElementById('m-unid').value.trim(),
    periodo: document.getElementById('m-periodo').value.trim(),
    criadoEm: Date.now()
  }).then(function() {
    ['m-nome','m-alvo','m-atual','m-unid','m-periodo'].forEach(function(i) { document.getElementById(i).value = ''; });
    showAlert('alert-met', 'Meta adicionada!', 'ok');
  }).catch(function(e) { showAlert('alert-met', 'Erro: ' + e.message, 'err'); });
}
function atualizarMeta(id, nome, atualAgora) {
  if (!logado) return;
  var v = prompt('Atualizar valor atual de "' + nome + '":', atualAgora);
  if (v === null) return;
  var n = parseFloat(v);
  if (isNaN(n)) { showAlert('alert-met', 'Valor inválido.', 'err'); return; }
  db.collection('gestao_metas').doc(id).update({ atual: n })
    .catch(function(e) { showAlert('alert-met', 'Erro: ' + e.message, 'err'); });
}
function removerMeta(id) {
  if (!logado) return;
  if (!confirm('Remover esta meta?')) return;
  db.collection('gestao_metas').doc(id).delete()
    .catch(function(e) { showAlert('alert-met', 'Erro: ' + e.message, 'err'); });
}
function fmtNum(n) {
  return Number(n).toLocaleString('pt-BR', { maximumFractionDigits: 2 });
}
function renderMetas() {
  var lista = metas.slice().sort(function(a, b) { return b.criadoEm - a.criadoEm; });
  var el = document.getElementById('lista-met');
  if (lista.length === 0) { el.innerHTML = '<div class="empty">Nenhuma meta cadastrada ainda.</div>'; return; }
  el.innerHTML = lista.map(function(m) {
    var pct = m.alvo > 0 ? Math.min(100, Math.round(m.atual / m.alvo * 100)) : 0;
    var full = pct >= 100;
    var u = m.unidade ? ' ' + m.unidade : '';
    return '<div class="item">' +
      '<div class="item-head">' +
        '<div class="item-title">' + m.nome + (m.periodo ? ' <span style="font-weight:400;color:var(--muted);font-size:12px;">· ' + m.periodo + '</span>' : '') + '</div>' +
        '<button class="del-btn" onclick="removerMeta(\'' + m.id + '\')">&times;</button>' +
      '</div>' +
      '<div class="meta-row" style="margin-top:8px;">' +
        '<div class="meta-val">' + fmtNum(m.atual) + u + ' <small>/ ' + fmtNum(m.alvo) + u + '</small></div>' +
        '<div class="meta-val" style="font-size:1rem;">' + pct + '%</div>' +
      '</div>' +
      '<div class="progress"><div class="progress-fill' + (full ? ' full' : '') + '" style="width:' + pct + '%;"></div></div>' +
      '<div class="actions"><button class="act-btn" onclick="atualizarMeta(\'' + m.id + '\',\'' + esc(m.nome) + '\',' + m.atual + ')">Atualizar valor</button></div>' +
    '</div>';
  }).join('');
}

/* ===================== DECISÕES ===================== */
function criarDecisao() {
  if (!logado) return;
  var decisao = document.getElementById('d-decisao').value.trim();
  if (!decisao) { showAlert('alert-dec', 'Descreve a decisão.', 'err'); return; }
  db.collection('gestao_decisoes').add({
    data: document.getElementById('d-data').value || hojeStr(),
    decisao: decisao,
    contexto: document.getElementById('d-contexto').value.trim(),
    responsavel: document.getElementById('d-resp').value,
    criadoEm: Date.now()
  }).then(function() {
    document.getElementById('d-decisao').value = '';
    document.getElementById('d-contexto').value = '';
    showAlert('alert-dec', 'Decisão registrada!', 'ok');
  }).catch(function(e) { showAlert('alert-dec', 'Erro: ' + e.message, 'err'); });
}
function removerDecisao(id) {
  if (!logado) return;
  if (!confirm('Remover esta decisão?')) return;
  db.collection('gestao_decisoes').doc(id).delete()
    .catch(function(e) { showAlert('alert-dec', 'Erro: ' + e.message, 'err'); });
}
function renderDecisoes() {
  var lista = decisoes.slice().sort(function(a, b) {
    return (b.data || '').localeCompare(a.data || '') || (b.criadoEm - a.criadoEm);
  });
  var el = document.getElementById('lista-dec');
  if (lista.length === 0) { el.innerHTML = '<div class="empty">Nenhuma decisão registrada ainda.</div>'; return; }
  el.innerHTML = lista.map(function(d) {
    return '<div class="item">' +
      '<div class="item-head">' +
        '<div class="item-title">' + d.decisao + '</div>' +
        '<button class="del-btn" onclick="removerDecisao(\'' + d.id + '\')">&times;</button>' +
      '</div>' +
      '<div class="item-meta"><span class="badge badge-accent">' + fmtData(d.data) + '</span>' +
        '<span class="badge badge-muted">' + (d.responsavel || '—') + '</span></div>' +
      (d.contexto ? '<div class="item-desc" style="margin-top:10px;">' + d.contexto + '</div>' : '') +
    '</div>';
  }).join('');
}

/* ---------- boot ---------- */
window.addEventListener('load', function() {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  auth = firebase.auth();

  document.getElementById('t-prazo').value = '';
  document.getElementById('r-data').value = hojeStr();
  document.getElementById('d-data').value = hojeStr();

  auth.onAuthStateChanged(function(user) {
    if (!user) { nivel = 'publico'; logado = false; }
    else if (user.email === ADMIN_EMAIL) { nivel = 'admin'; logado = true; }
    else if (user.email === GERENTE_EMAIL) { nivel = 'gerente'; logado = true; }
    else {
      nivel = 'publico'; logado = false;
      document.getElementById('gate-title').textContent = 'Sem acesso';
      document.getElementById('gate-msg').textContent = 'A conta ' + user.email + ' não tem permissão neste painel. Entre com a conta autorizada.';
      auth.signOut();
    }
    atualizarUI();
  });

  db.collection('gestao_tarefas').onSnapshot(function(snap) {
    tarefas = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    renderTarefas();
  });
  db.collection('gestao_reunioes').onSnapshot(function(snap) {
    reunioes = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    renderReunioes();
  });
  db.collection('gestao_metas').onSnapshot(function(snap) {
    metas = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    renderMetas();
  });
  db.collection('gestao_decisoes').onSnapshot(function(snap) {
    decisoes = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    renderDecisoes();
  });
});
</script>
