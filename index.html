<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Benefícios — Equipe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F4EF; --surface: #FFFFFF; --accent: #C4956A; --accent-light: #F2E8DC;
    --text: #1C1A17; --muted: #8A8478; --border: #E2DDD6;
    --green: #4A7C59; --green-bg: #EAF2EC; --amber: #9A6B1F; --amber-bg: #FBF1DC;
    --red: #9B3A3A; --red-bg: #FAE8E8; --radius: 14px; --radius-sm: 8px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
  header { background: var(--text); color: #F7F4EF; padding: 1.5rem; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: space-between; }
  header::after { content: ''; position: absolute; right: -40px; top: -40px; width: 180px; height: 180px; border-radius: 50%; background: var(--accent); opacity: 0.15; pointer-events: none; }
  .header-left h1 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; font-weight: 400; letter-spacing: -0.01em; margin-bottom: 2px; }
  .header-left p { font-size: 12px; opacity: 0.5; font-weight: 300; }
  .header-right { position: relative; z-index: 2; }
  .login-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #F7F4EF; border-radius: var(--radius-sm); padding: 7px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: background 0.2s; }
  .login-btn:hover { background: rgba(255,255,255,0.2); }
  .login-badge { display: flex; align-items: center; gap: 8px; }
  .login-badge span { font-size: 12px; opacity: 0.7; }
  .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: #F7F4EF; border-radius: var(--radius-sm); padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .logout-btn:hover { background: rgba(255,255,255,0.1); }
  .modal-bg { position: fixed; inset: 0; background: rgba(28,26,23,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 360px; border: 1px solid var(--border); }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
  .modal .form-group { margin-bottom: 12px; }
  .modal-err { background: var(--red-bg); color: var(--red); padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 12px; display: none; }
  .modal-cancel { width: 100%; padding: 10px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--muted); cursor: pointer; margin-top: 8px; }
  .main { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--surface); border-radius: var(--radius); padding: 1rem; border: 1px solid var(--border); text-align: center; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 2rem; line-height: 1; color: var(--accent); margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .card-admin { border-color: var(--accent); }
  .card-admin .card-title { color: var(--accent); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 12px; color: var(--muted); }
  input, select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: var(--accent); }
  .btn { width: 100%; padding: 12px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-sm { width: auto; padding: 10px 18px; margin-top: 0; }
  .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 10px; display: none; }
  .alert-ok { background: var(--green-bg); color: var(--green); }
  .alert-err { background: var(--red-bg); color: var(--red); }
  .prof-tags { display: flex; flex-wrap: wrap; gap: 8px; min-height: 24px; }
  .prof-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-light); border-radius: 99px; padding: 4px 12px; }
  .prof-tag span { font-size: 13px; color: var(--accent); font-weight: 500; }
  .prof-tag button { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 16px; line-height: 1; padding: 0 2px; opacity: 0.6; }
  .prof-tag button:hover { opacity: 1; }
  .list { display: flex; flex-direction: column; gap: 10px; }
  .item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; display: flex; flex-wrap: wrap; align-items: flex-start; gap: 10px; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 15px; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 120px; }
  .item-name { font-weight: 500; font-size: 14px; word-break: break-word; }
  .item-sub { font-size: 12px; color: var(--muted); margin-top: 2px; word-break: break-word; }
  .item-right { text-align: right; flex-shrink: 0; max-width: 160px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 500; margin-bottom: 4px; }
  .badge-ok { background: var(--green-bg); color: var(--green); }
  .badge-warn { background: var(--amber-bg); color: var(--amber); }
  .badge-free { background: var(--accent-light); color: var(--accent); }
  .badge-pendente { background: var(--amber-bg); color: var(--amber); }
  .badge-aprovado { background: var(--green-bg); color: var(--green); }
  .aprovar-btn { background: none; border: 1px solid var(--green); color: var(--green); border-radius: var(--radius-sm); padding: 3px 10px; font-size: 11px; font-weight: 500; cursor: pointer; margin-top: 4px; font-family: 'DM Sans', sans-serif; transition: background 0.2s; display: block; }
  .aprovar-btn:hover { background: var(--green-bg); }
  .item-next { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .del-btn { background: none; border: none; color: var(--border); cursor: pointer; font-size: 18px; line-height: 1; padding: 4px; transition: color 0.2s; flex-shrink: 0; }
  .del-btn:hover { color: var(--red); }
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .empty span { display: block; font-family: 'DM Serif Display', serif; font-size: 2rem; margin-bottom: 8px; opacity: 0.3; }
  .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }
  .filter-row { margin-bottom: 1rem; }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } .stat-num { font-size: 1.5rem; } }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Benefícios da Equipe</h1>
    <p>Controle de serviços — ciclo de 45 dias</p>
  </div>
  <div class="header-right" id="header-auth">
    <button class="login-btn" onclick="abrirModal()">Entrar como admin</button>
  </div>
</header>

<div class="modal-bg" id="modal" style="display:none;">
  <div class="modal">
    <h2>Área administrativa</h2>
    <p>Acesso restrito ao administrador do salão.</p>
    <div class="modal-err" id="modal-err">Usuário ou senha incorretos.</div>
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="login-user" placeholder="usuário" autocomplete="username" onkeydown="if(event.key==='Enter')fazerLogin()" />
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()" />
    </div>
    <button class="btn" onclick="fazerLogin()">Entrar</button>
    <button class="modal-cancel" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="st-total">0</div><div class="stat-label">Profissionais</div></div>
    <div class="stat"><div class="stat-num" id="st-ativos">0</div><div class="stat-label">Ativos</div></div>
    <div class="stat"><div class="stat-num" id="st-livres">0</div><div class="stat-label">Liberados</div></div>
  </div>

  <div class="card card-admin" id="painel-admin" style="display:none;">
    <div class="card-title">&#9670; Cadastro de profissionais — admin</div>
    <div id="alert-prof" class="alert"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <input type="text" id="novo-prof" placeholder="Nome do profissional" style="flex:1;" onkeydown="if(event.key==='Enter')adicionarProf()" />
      <button class="btn btn-sm" onclick="adicionarProf()">Adicionar</button>
    </div>
    <div class="prof-tags" id="lista-profs">
      <span style="font-size:13px;color:var(--muted);">Carregando...</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Registrar benefício</div>
    <div id="alert" class="alert"></div>
    <div class="form-grid">
      <div class="form-group">
        <label>Profissional</label>
        <select id="nome"><option value="">Selecione...</option></select>
      </div>
      <div class="form-group">
        <label>Data do serviço</label>
        <input type="date" id="data" />
      </div>
    </div>
    <div class="form-group" style="margin-bottom:10px;">
      <label>Serviço realizado</label>
      <input type="text" id="servico" placeholder="Ex: Hidratação + escova" />
    </div>
    <button class="btn" onclick="registrar()">Registrar</button>
  </div>

  <div class="filter-row">
    <input type="text" id="busca" placeholder="Buscar profissional no histórico..." oninput="renderizar()" />
  </div>

  <div class="list" id="lista"><div class="loading">Carregando dados...</div></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy, getDocs, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCXq8_1adhUWx7Au1IDszbpu5bZ5d0A8gk",
    authDomain: "voox-1956.firebaseapp.com",
    projectId: "voox-1956",
    storageBucket: "voox-1956.firebasestorage.app",
    messagingSenderId: "199589852171",
    appId: "1:199589852171:web:c9196e78067bb7864fc30e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ADMIN_USER = 'joao';
  const ADMIN_PASS = '1012';
  let logado = sessionStorage.getItem('admin_logado') === 'sim';
  let profissionais = [];
  let dados = [];

  const profsPadrao = ['Andressa Muraro','Anelise Doere','Camila Freitas','Carliana Largher','Gilmara Francisco','Gisele Cooper','Itamar Frota','Jessica Garcia','Karina Maravalha','Luis Felipe','Luiza Benati','Marcia Bortolotto','Marcio Pereira','Miriam Quevedo','Núbia Beatriz','Prizia Carolina','Raphaela Santana','Rosani Bortolini','Tatiana Altermann','Tatiana Matte','Veridiana Rocha','Vivian Duarte','Vladimir Fraga'];

  // Seed profissionais — garante que todos estão salvos
  async function seedProfissionais() {
    const snap = await getDocs(collection(db, 'profissionais'));
    const nomesExistentes = snap.docs.map(d => d.data().nome.toLowerCase());
    const faltando = profsPadrao.filter(n => !nomesExistentes.includes(n.toLowerCase()));
    for (const nome of faltando) {
      await addDoc(collection(db, 'profissionais'), { nome });
    }
  }
  seedProfissionais();

  // Escuta profissionais em tempo real
  onSnapshot(collection(db, 'profissionais'), (snap) => {
    profissionais = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    profissionais.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
    renderizarProfs();
  });

  // Escuta registros em tempo real
  onSnapshot(query(collection(db, 'beneficios'), orderBy('criadoEm', 'desc')), (snap) => {
    dados = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderizar();
  });

  function diasRestantes(dataStr) {
    var d = new Date(dataStr + 'T12:00:00');
    var prox = new Date(d);
    prox.setDate(prox.getDate() + 45);
    var hoje = new Date();
    hoje.setHours(12, 0, 0, 0);
    return Math.ceil((prox - hoje) / 86400000);
  }

  function proximaData(dataStr) {
    var d = new Date(dataStr + 'T12:00:00');
    d.setDate(d.getDate() + 45);
    return d.toLocaleDateString('pt-BR');
  }

  function iniciais(nome) {
    return nome.trim().split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
  }

  function showAlert(id, msg, tipo) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'alert alert-' + tipo;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3500);
  }

  window.abrirModal = function() {
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('login-user').focus();
    document.getElementById('modal-err').style.display = 'none';
  }

  window.fecharModal = function() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
  }

  window.fazerLogin = function() {
    var u = document.getElementById('login-user').value.trim();
    var p = document.getElementById('login-pass').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      logado = true;
      sessionStorage.setItem('admin_logado', 'sim');
      fecharModal();
      atualizarUI();
    } else {
      document.getElementById('modal-err').style.display = 'block';
      document.getElementById('login-pass').value = '';
    }
  }

  window.fazerLogout = function() {
    logado = false;
    sessionStorage.removeItem('admin_logado');
    atualizarUI();
  }

  function atualizarUI() {
    var headerAuth = document.getElementById('header-auth');
    var painelAdmin = document.getElementById('painel-admin');
    if (logado) {
      headerAuth.innerHTML = '<div class="login-badge"><span>Admin: joao</span><button class="logout-btn" onclick="fazerLogout()">Sair</button></div>';
      painelAdmin.style.display = 'block';
    } else {
      headerAuth.innerHTML = '<button class="login-btn" onclick="abrirModal()">Entrar como admin</button>';
      painelAdmin.style.display = 'none';
    }
    renderizarProfs();
    renderizar();
  }

  window.adicionarProf = async function() {
    if (!logado) return;
    var input = document.getElementById('novo-prof');
    var nome = input.value.trim();
    if (!nome) return;
    var existe = profissionais.some(p => p.nome.toLowerCase() === nome.toLowerCase());
    if (existe) { showAlert('alert-prof', 'Profissional já cadastrado.', 'err'); return; }
    await addDoc(collection(db, 'profissionais'), { nome });
    input.value = '';
    showAlert('alert-prof', nome + ' adicionado com sucesso!', 'ok');
  }

  window.removerProf = async function(id, nome) {
    if (!logado) return;
    if (!confirm('Remover ' + nome + ' da lista?')) return;
    await deleteDoc(doc(db, 'profissionais', id));
  }

  function renderizarProfs() {
    var lista = document.getElementById('lista-profs');
    var select = document.getElementById('nome');
    var valorAtual = select.value;

    if (profissionais.length === 0) {
      lista.innerHTML = '<span style="font-size:13px;color:var(--muted);">Nenhum profissional cadastrado ainda.</span>';
    } else {
      lista.innerHTML = profissionais.map(p =>
        '<div class="prof-tag"><span>' + p.nome + '</span>' +
        (logado ? '<button onclick="removerProf(\'' + p.id + '\',\'' + p.nome.replace(/'/g,"\\'") + '\')">×</button>' : '') +
        '</div>'
      ).join('');
    }

    select.innerHTML = '<option value="">Selecione...</option>' +
      profissionais.map(p =>
        '<option value="' + p.nome + '"' + (p.nome === valorAtual ? ' selected' : '') + '>' + p.nome + '</option>'
      ).join('');
  }

  window.registrar = async function() {
    var nome = document.getElementById('nome').value;
    var data = document.getElementById('data').value;
    var servico = document.getElementById('servico').value.trim();

    if (!nome || !data || !servico) { showAlert('alert', 'Preencha todos os campos.', 'err'); return; }

    var registrosProf = dados.filter(r => r.nome === nome);
    registrosProf.sort((a, b) => new Date(b.data) - new Date(a.data));
    var ultimo = registrosProf[0];

    if (ultimo) {
      var dias = diasRestantes(ultimo.data);
      if (dias > 0) {
        showAlert('alert', nome + ' ainda não pode usar o benefício. Liberado a partir de ' + proximaData(ultimo.data) + '.', 'err');
        return;
      }
    }

    await addDoc(collection(db, 'beneficios'), {
      nome, data, servico, status: 'pendente', criadoEm: Date.now()
    });
    document.getElementById('nome').value = '';
    document.getElementById('servico').value = '';
    showAlert('alert', 'Benefício registrado com sucesso!', 'ok');
  }

  window.aprovar = async function(id) {
    if (!logado) return;
    await updateDoc(doc(db, 'beneficios', id), { status: 'aprovado' });
  }

  window.remover = async function(id) {
    if (!logado) { showAlert('alert', 'Apenas o administrador pode remover registros.', 'err'); return; }
    if (!confirm('Remover este registro?')) return;
    await deleteDoc(doc(db, 'beneficios', id));
  }

  function renderizar() {
    var busca = document.getElementById('busca').value.toLowerCase();
    var lista = document.getElementById('lista');
    var filtrados = busca ? dados.filter(r => r.nome.toLowerCase().includes(busca)) : dados;

    var nomes = new Set(dados.map(r => r.nome));
    var ativos = 0, livres = 0;
    dados.forEach(r => {
      var d = diasRestantes(r.data);
      if (d >= 0) ativos++; else livres++;
    });

    document.getElementById('st-total').textContent = nomes.size;
    document.getElementById('st-ativos').textContent = ativos;
    document.getElementById('st-livres').textContent = livres;

    if (filtrados.length === 0) {
      lista.innerHTML = '<div class="empty"><span>✦</span>' + (busca ? 'Nenhum resultado encontrado.' : 'Nenhum benefício registrado ainda.') + '</div>';
      return;
    }

    lista.innerHTML = filtrados.map(r => {
      var dias = diasRestantes(r.data);
      var dataFmt = new Date(r.data + 'T12:00:00').toLocaleDateString('pt-BR');
      var periodoBadge, sub;
      if (dias < 0) {
        periodoBadge = '<span class="badge badge-free">Liberado para novo</span>';
        sub = 'Disponível a partir de agora';
      } else if (dias <= 7) {
        periodoBadge = '<span class="badge badge-warn">Vence em ' + dias + 'd</span>';
        sub = 'Próximo benefício: ' + proximaData(r.data);
      } else {
        periodoBadge = '<span class="badge badge-ok">' + dias + ' dias restantes</span>';
        sub = 'Próximo benefício: ' + proximaData(r.data);
      }

      var isPendente = !r.status || r.status === 'pendente';
      var statusBadge = isPendente
        ? '<span class="badge badge-pendente">Pendente</span>'
        : '<span class="badge badge-aprovado">Aprovado</span>';
      var aprBtn = (logado && isPendente)
        ? '<button class="aprovar-btn" onclick="aprovar(\'' + r.id + '\')">Aprovar</button>'
        : '';

      return '<div class="item">' +
        '<div class="avatar">' + iniciais(r.nome) + '</div>' +
        '<div class="item-info"><div class="item-name">' + r.nome + '</div><div class="item-sub">' + r.servico + ' · ' + dataFmt + '</div></div>' +
        '<div class="item-right">' +
          statusBadge +
          (aprBtn ? '<div style="margin-top:4px;">' + aprBtn + '</div>' : '') +
          '<div class="item-next">' + periodoBadge + ' · ' + sub + '</div>' +
        '</div>' +
        (logado ? '<button class="del-btn" onclick="remover(\'' + r.id + '\')">×</button>' : '') +
        '</div>';
    }).join('');
  }

  document.getElementById('data').valueAsDate = new Date();
  atualizarUI();
</script>
</body>
</html>
