<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Benefícios — Equipe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --accent: #C4956A;
    --accent-light: #F2E8DC;
    --text: #1C1A17;
    --muted: #8A8478;
    --border: #E2DDD6;
    --green: #4A7C59;
    --green-bg: #EAF2EC;
    --amber: #9A6B1F;
    --amber-bg: #FBF1DC;
    --red: #9B3A3A;
    --red-bg: #FAE8E8;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    background: var(--text);
    color: #F7F4EF;
    padding: 2rem 1.5rem 1.75rem;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    right: -40px;
    top: -40px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.15;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.9rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  header p {
    font-size: 13px;
    opacity: 0.55;
    font-weight: 300;
  }

  .main { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .stat {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1rem;
    border: 1px solid var(--border);
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  .form-group { display: flex; flex-direction: column; gap: 5px; }

  label { font-size: 12px; color: var(--muted); font-weight: 400; }

  input, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 12px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    letter-spacing: 0.01em;
    transition: opacity 0.2s;
  }

  .btn:hover { opacity: 0.85; }

  .alert {
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 10px;
    display: none;
    font-weight: 400;
  }

  .alert-ok { background: var(--green-bg); color: var(--green); }
  .alert-err { background: var(--red-bg); color: var(--red); }

  .list { display: flex; flex-direction: column; gap: 10px; }

  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--accent-light);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    flex-shrink: 0;
  }

  .item-info { flex: 1; min-width: 0; }

  .item-name {
    font-weight: 500;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .item-right { text-align: right; flex-shrink: 0; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .badge-ok { background: var(--green-bg); color: var(--green); }
  .badge-warn { background: var(--amber-bg); color: var(--amber); }
  .badge-free { background: var(--accent-light); color: var(--accent); }

  .item-next { font-size: 11px; color: var(--muted); }

  .del-btn {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .del-btn:hover { color: var(--red); }

  .empty {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--muted);
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .empty span {
    display: block;
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    margin-bottom: 8px;
    opacity: 0.3;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .filter-row input { flex: 1; }

  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(3, 1fr); }
    .stat-num { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Benefícios da Equipe</h1>
  <p>Controle de serviços — ciclo de 45 dias</p>
</header>

<div class="main">

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="st-total">0</div>
      <div class="stat-label">Profissionais</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="st-ativos">0</div>
      <div class="stat-label">Ativos</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="st-livres">0</div>
      <div class="stat-label">Liberados</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Registrar benefício</div>
    <div id="alert" class="alert"></div>
    <div class="form-grid">
      <div class="form-group">
        <label>Nome do profissional</label>
        <input type="text" id="nome" placeholder="Ex: Ana Paula" />
      </div>
      <div class="form-group">
        <label>Data do serviço</label>
        <input type="date" id="data" />
      </div>
    </div>
    <div class="form-group" style="margin-bottom:10px;">
      <label>Serviço realizado</label>
      <input type="text" id="servico" placeholder="Ex: Hidratação + escova" />
    </div>
    <button class="btn" onclick="registrar()">Registrar</button>
  </div>

  <div class="filter-row">
    <input type="text" id="busca" placeholder="Buscar profissional..." oninput="renderizar()" />
  </div>

  <div class="list" id="lista"></div>

</div>

<script>
  let dados = JSON.parse(localStorage.getItem('beneficios_v2') || '[]');

  function salvar() {
    localStorage.setItem('beneficios_v2', JSON.stringify(dados));
  }

  function diasRestantes(dataStr) {
    const d = new Date(dataStr + 'T12:00:00');
    const prox = new Date(d);
    prox.setDate(prox.getDate() + 45);
    const hoje = new Date();
    hoje.setHours(12, 0, 0, 0);
    return Math.ceil((prox - hoje) / 86400000);
  }

  function proximaData(dataStr) {
    const d = new Date(dataStr + 'T12:00:00');
    d.setDate(d.getDate() + 45);
    return d.toLocaleDateString('pt-BR');
  }

  function iniciais(nome) {
    return nome.trim().split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
  }

  function showAlert(msg, tipo) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert alert-' + tipo;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function registrar() {
    const nome = document.getElementById('nome').value.trim();
    const data = document.getElementById('data').value;
    const servico = document.getElementById('servico').value.trim();

    if (!nome || !data || !servico) {
      showAlert('Preencha todos os campos.', 'err');
      return;
    }

    const hoje = new Date();
    const dataSel = new Date(data + 'T12:00:00');
    const diff = Math.ceil((hoje - dataSel) / 86400000);

    if (diff > 45) {
      showAlert('Data fora do período de 45 dias.', 'err');
      return;
    }

    dados.unshift({ nome, data, servico, id: Date.now() });
    salvar();
    document.getElementById('nome').value = '';
    document.getElementById('servico').value = '';
    showAlert('Benefício registrado!', 'ok');
    renderizar();
  }

  function remover(id) {
    if (!confirm('Remover este registro?')) return;
    dados = dados.filter(r => r.id !== id);
    salvar();
    renderizar();
  }

  function renderizar() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const lista = document.getElementById('lista');
    const filtrados = busca ? dados.filter(r => r.nome.toLowerCase().includes(busca)) : dados;

    const nomes = new Set(dados.map(r => r.nome));
    let ativos = 0, livres = 0;

    dados.forEach(r => {
      const d = diasRestantes(r.data);
      if (d >= 0) ativos++;
      else livres++;
    });

    document.getElementById('st-total').textContent = nomes.size;
    document.getElementById('st-ativos').textContent = ativos;
    document.getElementById('st-livres').textContent = livres;

    if (filtrados.length === 0) {
      lista.innerHTML = `<div class="empty"><span>✦</span>${busca ? 'Nenhum resultado encontrado.' : 'Nenhum benefício registrado ainda.'}</div>`;
      return;
    }

    lista.innerHTML = filtrados.map(r => {
      const dias = diasRestantes(r.data);
      const dataFmt = new Date(r.data + 'T12:00:00').toLocaleDateString('pt-BR');
      let badge, sub;

      if (dias < 0) {
        badge = `<span class="badge badge-free">Liberado para novo</span>`;
        sub = `Próximo disponível a partir de agora`;
      } else if (dias <= 7) {
        badge = `<span class="badge badge-warn">Vence em ${dias}d</span>`;
        sub = `Próximo benefício: ${proximaData(r.data)}`;
      } else {
        badge = `<span class="badge badge-ok">${dias} dias restantes</span>`;
        sub = `Próximo benefício: ${proximaData(r.data)}`;
      }

      return `<div class="item">
        <div class="avatar">${iniciais(r.nome)}</div>
        <div class="item-info">
          <div class="item-name">${r.nome}</div>
          <div class="item-sub">${r.servico} · ${dataFmt}</div>
        </div>
        <div class="item-right">
          ${badge}
          <div class="item-next">${sub}</div>
        </div>
        <button class="del-btn" onclick="remover(${r.id})">×</button>
      </div>`;
    }).join('');
  }

  document.getElementById('data').valueAsDate = new Date();
  renderizar();
</script>
</body>
</html>
